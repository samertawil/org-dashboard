<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - AFSC Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f7fabf;
            /* Light yellowish background */
            color: #333;
            text-align: center;
        }

        .container {
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #d9534f;
            /* Red color */
            margin-bottom: 1rem;
        }

        p {
            margin-bottom: 1.5rem;
            color: #666;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        button {
            background-color: #0275d8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #025aa5;
        }
    </style>
    <script>
        window.addEventListener('online', () => {
            window.location.reload();
        });
    </script>
</head>

<body>
    <div class="container">
        <img src="/logo2.png" alt="AFSC Logo" style="height: 80px; margin-bottom: 1rem;">
        <h1>You are Offline</h1>
        <p>It seems you have lost your internet connection. Please check your network and try again.</p>
        <button onclick="window.location.reload()">Reload Page</button>
    </div>
</body>

</html>
