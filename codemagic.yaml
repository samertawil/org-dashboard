workflows:
  android-workflow:
    name: Android APK Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_play_credentials # Optional
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Initialize Flutter project
        script: |
          cd mobile
          flutter create . --platforms android,ios
          # Hotfix: Inject namespace for plugins that lack it (Fixes AGP 8.0+ issues)
          echo "
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty('android')) {
                      project.android {
                          if (namespace == null) {
                              namespace = project.group
                          }
                          compileOptions {
                              sourceCompatibility JavaVersion.VERSION_17
                              targetCompatibility JavaVersion.VERSION_17
                          }
                          defaultConfig {
                              minSdkVersion 23
                              targetSdkVersion 34
                          }
                      }
                      project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                          kotlinOptions {
                              jvmTarget = '17'
                          }
                      }
                  }
              }
          }" >> android/build.gradle
      - name: Add Internet Permission
        script: |
          cd mobile
          sed -i '' 's/<application/<uses-permission android:name="android.permission.INTERNET" \/>\n    <application/g' android/app/src/main/AndroidManifest.xml
      - name: Get Flutter packages
        script: |
          cd mobile
          flutter pub get
      - name: Build Android APK
        script: |
          cd mobile
          flutter build apk --release --verbose
          echo "Listing all files in build directory:"
          ls -R build | grep .apk || echo "No APK found in build directory"
          find . -name "*.apk"
    artifacts:
      - "**/build/**/*.apk"

  ios-workflow:
    name: iOS Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true
          source: true
    scripts:
      - name: Initialize Flutter project
        script: |
          cd mobile
          flutter create . --platforms ios
      - name: Get Flutter packages
        script: |
          cd mobile
          flutter pub get
      - name: Build iOS
        script: |
          cd mobile
          # Building without signing for now to ensure it compiles
          flutter build ios --release --no-codesign
          
          # Package the .app into an unsigned .ipa file
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr app_unsigned.ipa Payload
    artifacts:
      - "mobile/build/ios/iphoneos/*.ipa"
